name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }} # Opcional, se sua chave tiver senha
          script: |
            cd /path/to/your/rpg-manager # Ajuste para o caminho na sua VPS
            git pull origin main
            # Opcional: injetar variáveis de ambiente se necessário
            # echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
            docker compose build
            docker compose up -d
