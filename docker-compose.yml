services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rpg_manager
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: 
      - 5432:5432

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://rpg:${DB_PASSWORD}@db:5432/rpg_manager?sslmode=disable
      MIGRATION_URL: postgres://rpg:${DB_PASSWORD}@db:5432/rpg_manager?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: "*"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080

volumes:
  pgdata: